<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าโปรไฟล์ - DOSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans relative">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>

    <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700 z-10 relative">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-400">ตั้งค่าโปรไฟล์ส่วนตัว</h1>
            <p class="text-gray-400 text-sm mt-1">อัปเดตข้อมูลของคุณในทีม DOSH</p>
        </div>

        <div class="space-y-5">
            <div class="flex flex-col items-center mb-4">
                <div class="relative group cursor-pointer" id="avatar-container">
                    <img id="preview-avatar" src="" class="w-28 h-28 rounded-full border-4 border-gray-700 object-cover group-hover:opacity-50 transition duration-300">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                        <span class="text-white text-sm font-bold drop-shadow-md">📷 เปลี่ยนรูป</span>
                    </div>
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
                </div>
                <p id="upload-status" class="text-xs text-indigo-400 mt-2 h-4"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">ชื่อเล่นที่แสดง (Display Name)</label>
                <input type="text" id="display-name" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-200 focus:outline-none focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">สถานะ / คำอธิบายตัวเอง (Bio)</label>
                <input type="text" id="user-bio" placeholder="เช่น กำลังตัดคลิปด่วน!, ว่างรับงาน ฯลฯ" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-200 focus:outline-none focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">สายงานหลัก (Role)</label>
                <select id="user-role" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-gray-200 focus:outline-none focus:border-indigo-500 transition cursor-pointer">
                    <option value="Dev (นักพัฒนา)">💻 Developer</option>
                    <option value="Design (ออกแบบ)">🎨 Designer</option>
                    <option value="Video (ตัดต่อวีดีโอ)">🎬 Video Editor</option>
                    <option value="Music (เสียงและดนตรี)">🎵 Music Producer</option>
                    <option value="Member">🎮 Member</option>
                </select>
            </div>

            <div class="pt-4 space-y-3">
                <button id="save-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-lg transition shadow-lg shadow-indigo-500/20">💾 บันทึกการตั้งค่า</button>
                <a href="app.html" class="block text-center w-full bg-gray-700 hover:bg-gray-600 text-gray-300 py-2.5 rounded-lg transition">กลับไปหน้าหลัก (App)</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBNsG-gdNHZzIerTyd33fIwblwccktfU9I",
            authDomain: "apoko-hq.firebaseapp.com",
            projectId: "apoko-hq",
            storageBucket: "apoko-hq.firebasestorage.app",
            messagingSenderId: "122632343459",
            appId: "1:122632343459:web:c225aaff8464f1b0c35416"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "6b400d48dc08e690c88a8b32f3cef56a";

        let currentUid = null;
        let finalAvatarUrl = ""; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('display-name').value = data.username || user.displayName || "";
                    document.getElementById('user-role').value = data.role || "Member";
                    document.getElementById('user-bio').value = data.bio || "";
                    
                    if (data.photoURL) {
                        finalAvatarUrl = data.photoURL;
                        document.getElementById('preview-avatar').src = finalAvatarUrl;
                    } else {
                        const defaultName = data.username || 'U';
                        finalAvatarUrl = `https://ui-avatars.com/api/?name=${defaultName}&background=4f46e5&color=fff&rounded=true&bold=true&size=128`;
                        document.getElementById('preview-avatar').src = finalAvatarUrl;
                    }
                }
            } else { 
                window.location.href = "index.html"; 
            }
        });

        const avatarContainer = document.getElementById('avatar-container');
        const avatarUpload = document.getElementById('avatar-upload');
        const uploadStatus = document.getElementById('upload-status');

        avatarContainer.addEventListener('click', (e) => {
            if (e.target.id !== 'avatar-upload') {
                avatarUpload.click();
            }
        });

        avatarUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // โชว์รูปทันทีแบบ Local Preview
            const localUrl = URL.createObjectURL(file);
            document.getElementById('preview-avatar').src = localUrl;

            uploadStatus.textContent = "กำลังส่งรูปไปที่เซิร์ฟเวอร์ (รอสักครู่)...";
            uploadStatus.className = "text-xs text-yellow-400 mt-2 h-4 font-bold";
            
            document.getElementById('save-btn').disabled = true; 
            document.getElementById('save-btn').classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    finalAvatarUrl = result.data.url; 
                    uploadStatus.textContent = "อัปโหลดเสร็จแล้ว! กดปุ่มบันทึกด้านล่างได้เลยครับ";
                    uploadStatus.className = "text-xs text-green-400 mt-2 h-4 font-bold";
                } else {
                    uploadStatus.textContent = "เกิดข้อผิดพลาดในการอัปโหลด";
                    uploadStatus.className = "text-xs text-red-400 mt-2 h-4 font-bold";
                }
            } catch (error) {
                console.error(error);
                uploadStatus.textContent = "การเชื่อมต่อล้มเหลว ลองใหม่อีกครั้งนะครับ";
                uploadStatus.className = "text-xs text-red-400 mt-2 h-4 font-bold";
            } finally {
                document.getElementById('save-btn').disabled = false;
                document.getElementById('save-btn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        document.getElementById('save-btn').addEventListener('click', async () => {
            const name = document.getElementById('display-name').value.trim();
            const role = document.getElementById('user-role').value;
            const bio = document.getElementById('user-bio').value.trim();

            if(!name) return alert("กรุณาใส่ชื่อด้วยครับ");

            const originalText = document.getElementById('save-btn').textContent;
            document.getElementById('save-btn').textContent = "กำลังบันทึก...";

            try {
                await updateProfile(auth.currentUser, { 
                    displayName: name,
                    photoURL: finalAvatarUrl 
                });

                await updateDoc(doc(db, "users", currentUid), { 
                    username: name, 
                    role: role,
                    bio: bio,
                    photoURL: finalAvatarUrl
                });

                alert("อัปเดตโปรไฟล์สำเร็จแล้ว! ✨");
                window.location.href = "app.html"; // 🌟 กลับไปที่หน้าหลัก (SPA)
            } catch (e) { 
                console.error(e);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
                document.getElementById('save-btn').textContent = originalText;
            }
        });
    </script>
</body>
</html>
