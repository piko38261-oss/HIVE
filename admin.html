<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSH - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0e0f11; color: #dbdee1; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #35373c; }
        .tab-active { background-color: #5865F2; color: white; }
        .tab-inactive { background-color: #1a1b1e; color: #80848e; }
        .tab-inactive:hover { background-color: #2b2d31; color: #dbdee1; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#151619] border-b border-[#1e1f22] p-4 flex justify-between items-center shadow-md z-10">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-lg bg-[#da373c] flex items-center justify-center text-white shadow-inner">
                <i class="ph-fill ph-shield-check text-[24px]"></i>
            </div>
            <div>
                <h1 class="text-[16px] font-extrabold text-[#e4e5e7] tracking-wide">Admin Dashboard</h1>
                <p class="text-[11px] text-[#80848e]">DOSH Workspace Control Center</p>
            </div>
        </div>
        <a href="app.html" class="bg-[#2b2d31] hover:bg-[#35373c] text-[#dbdee1] px-4 py-2 rounded-md font-bold text-[13px] transition flex items-center">
            <i class="ph ph-arrow-left mr-2 text-[16px]"></i> กลับสู่แอป
        </a>
    </header>

    <div class="bg-[#0f1013] border-b border-[#1e1f22] p-4 flex space-x-3">
        <button id="tab-users" class="px-5 py-2.5 rounded-md font-bold text-[14px] transition tab-active flex items-center">
            <i class="ph-fill ph-users mr-2 text-[18px]"></i> จัดการสมาชิก
        </button>
        <button id="tab-messages" class="px-5 py-2.5 rounded-md font-bold text-[14px] transition tab-inactive flex items-center">
            <i class="ph-fill ph-chats mr-2 text-[18px]"></i> จัดการแชท (Moderation)
        </button>
    </div>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative">
        
        <div id="loading-screen" class="absolute inset-0 bg-[#0e0f11] z-50 flex flex-col items-center justify-center">
            <i class="ph ph-spinner-gap animate-spin text-[#5865F2] text-[40px] mb-3"></i>
            <p class="text-[#80848e] font-bold">กำลังตรวจสอบสิทธิ์ Admin...</p>
        </div>

        <div id="view-users" class="max-w-5xl mx-auto space-y-4">
            <div class="bg-[#151619] rounded-xl border border-[#1e1f22] overflow-hidden shadow-lg">
                <div class="p-4 border-b border-[#1e1f22] flex justify-between items-center bg-[#1a1b1e]">
                    <h2 class="font-bold text-[#e4e5e7]">รายชื่อสมาชิกทั้งหมด (<span id="total-users">0</span>)</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-[#0a0a0c] text-[#80848e] text-[12px] uppercase tracking-wider">
                                <th class="p-4 font-bold">ผู้ใช้งาน</th>
                                <th class="p-4 font-bold">อีเมล</th>
                                <th class="p-4 font-bold">สถานะ (Status)</th>
                                <th class="p-4 font-bold">ตำแหน่ง (Role)</th>
                                <th class="p-4 font-bold text-right">การจัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body" class="divide-y divide-[#1e1f22] text-[14px]">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-messages" class="max-w-5xl mx-auto space-y-4 hidden">
            <div class="bg-[#151619] rounded-xl border border-[#1e1f22] overflow-hidden shadow-lg">
                <div class="p-4 border-b border-[#1e1f22] flex justify-between items-center bg-[#1a1b1e]">
                    <h2 class="font-bold text-[#e4e5e7]">ข้อความล่าสุดในระบบ</h2>
                    <span class="text-[11px] text-[#da373c] bg-[#da373c]/10 px-2 py-1 rounded font-bold">ลบแล้วลบเลย กู้คืนไม่ได้</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-[#0a0a0c] text-[#80848e] text-[12px] uppercase tracking-wider">
                                <th class="p-4 font-bold w-1/6">เวลา / ห้อง</th>
                                <th class="p-4 font-bold w-1/6">ผู้ส่ง</th>
                                <th class="p-4 font-bold w-3/6">ข้อความ / รูปภาพ</th>
                                <th class="p-4 font-bold text-right w-1/6">ลบข้อความ</th>
                            </tr>
                        </thead>
                        <tbody id="messages-table-body" class="divide-y divide-[#1e1f22] text-[14px]">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🚨 ตั้งค่า Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBNsG-gdNHZzIerTyd33fIwblwccktfU9I",
            authDomain: "apoko-hq.firebaseapp.com",
            projectId: "apoko-hq",
            storageBucket: "apoko-hq.firebasestorage.app",
            messagingSenderId: "122632343459",
            appId: "1:122632343459:web:c225aaff8464f1b0c35416"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🌟 สลับ Tabs
        const btnUsers = document.getElementById('tab-users'), btnMsgs = document.getElementById('tab-messages');
        const viewUsers = document.getElementById('view-users'), viewMsgs = document.getElementById('view-messages');

        btnUsers.onclick = () => {
            btnUsers.className = "px-5 py-2.5 rounded-md font-bold text-[14px] transition tab-active flex items-center";
            btnMsgs.className = "px-5 py-2.5 rounded-md font-bold text-[14px] transition tab-inactive flex items-center";
            viewUsers.classList.remove('hidden'); viewMsgs.classList.add('hidden');
        };
        btnMsgs.onclick = () => {
            btnMsgs.className = "px-5 py-2.5 rounded-md font-bold text-[14px] transition tab-active flex items-center";
            btnUsers.className = "px-5 py-2.5 rounded-md font-bold text-[14px] transition tab-inactive flex items-center";
            viewMsgs.classList.remove('hidden'); viewUsers.classList.add('hidden');
        };

        // 🛡️ ระบบตรวจสอบสิทธิ์ (Auth Guard)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().role === 'Admin') {
                    // เป็น Admin โหลดข้อมูลให้ดูได้
                    document.getElementById('loading-screen').classList.add('hidden');
                    loadUsers();
                    loadMessages();
                } else {
                    // ไม่ใช่ Admin ถีบกลับหน้า app.html
                    alert("⚠️ คุณไม่มีสิทธิ์เข้าถึงหน้า Admin Dashboard!");
                    window.location.href = "app.html";
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // 👥 ฟังก์ชันดึงรายชื่อสมาชิก
        function loadUsers() {
            const tbody = document.getElementById('users-table-body');
            onSnapshot(collection(db, "users"), (snapshot) => {
                tbody.innerHTML = '';
                document.getElementById('total-users').textContent = snapshot.size;

                snapshot.forEach((docSnap) => {
                    const u = docSnap.data(), uid = docSnap.id;
                    const avatar = u.photoURL || `https://ui-avatars.com/api/?name=${u.username}&background=5865F2&color=fff&rounded=true&bold=true`;
                    const isOnline = u.status === 'online' ? '<span class="text-[#23a559] bg-[#23a559]/10 px-2 py-1 rounded text-[11px] font-bold">Online</span>' : '<span class="text-[#5c6069] bg-[#1a1b1e] px-2 py-1 rounded text-[11px] font-bold">Offline</span>';
                    
                    let roleBadge = `<span class="text-[#5865F2] bg-[#5865F2]/10 px-2 py-1 rounded text-[11px] font-bold">Member</span>`;
                    if(u.role === 'Admin') roleBadge = `<span class="text-[#da373c] bg-[#da373c]/10 px-2 py-1 rounded text-[11px] font-bold">Admin</span>`;
                    if(u.role === 'Banned') roleBadge = `<span class="text-[#80848e] bg-gray-800 px-2 py-1 rounded text-[11px] font-bold line-through">Banned</span>`;

                    // ปุ่มแบน/ปลดแบน
                    let actionBtn = '';
                    if(u.role === 'Admin') {
                        actionBtn = `<span class="text-[#5c6069] text-[12px] italic">Cannot ban Admin</span>`;
                    } else if (u.role === 'Banned') {
                        actionBtn = `<button onclick="toggleBan('${uid}', 'Banned')" class="bg-[#23a559]/20 text-[#23a559] hover:bg-[#23a559] hover:text-white px-3 py-1.5 rounded-md text-[12px] font-bold transition flex items-center ml-auto"><i class="ph-fill ph-check-circle mr-1.5"></i> ปลดแบน</button>`;
                    } else {
                        actionBtn = `<button onclick="toggleBan('${uid}', 'Member')" class="bg-[#da373c]/20 text-[#da373c] hover:bg-[#da373c] hover:text-white px-3 py-1.5 rounded-md text-[12px] font-bold transition flex items-center ml-auto"><i class="ph-fill ph-prohibit mr-1.5"></i> แบนผู้ใช้</button>`;
                    }

                    tbody.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-[#1a1b1e] transition group">
                            <td class="p-4 flex items-center space-x-3">
                                <img src="${avatar}" class="w-8 h-8 rounded-full object-cover">
                                <span class="font-bold ${u.role === 'Banned' ? 'text-[#da373c] line-through' : 'text-[#dbdee1]'}">${u.username}</span>
                            </td>
                            <td class="p-4 text-[#80848e]">${u.email || '-'}</td>
                            <td class="p-4">${isOnline}</td>
                            <td class="p-4">${roleBadge}</td>
                            <td class="p-4 text-right">${actionBtn}</td>
                        </tr>
                    `);
                });
            });
        }

        // 💬 ฟังก์ชันดึงข้อความมาแสดง
        function loadMessages() {
            const tbody = document.getElementById('messages-table-body');
            // ดึงแชทล่าสุด 50 ข้อความเรียงตามเวลา
            const q = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(50));
            
            onSnapshot(q, (snapshot) => {
                tbody.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const m = docSnap.data(), msgId = docSnap.id;
                    const timeString = m.timestamp ? m.timestamp.toDate().toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' }) : '-';
                    const roomName = m.channel === 'general' ? 'ประกาศทั่วไป' : 'อัปเดตงานโปรเจกต์';
                    
                    let content = m.text ? `<p class="text-[#dbdee1]">${m.text}</p>` : '';
                    if (m.imageUrl) content += `<a href="${m.imageUrl}" target="_blank" class="text-[#5865F2] hover:underline text-[12px] flex items-center mt-1"><i class="ph ph-image mr-1"></i> [ดูรูปภาพที่แนบ]</a>`;

                    // ซ่อนข้อความบอทไม่ให้ลบเพื่อป้องกันบั๊ก
                    let deleteBtn = `<button onclick="deleteMessage('${msgId}')" class="text-[#80848e] hover:text-[#da373c] p-2 hover:bg-[#da373c]/10 rounded-md transition"><i class="ph-fill ph-trash text-[18px]"></i></button>`;
                    if(m.senderName === "🤖 System Bot") deleteBtn = "-";

                    tbody.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-[#1a1b1e] transition">
                            <td class="p-4">
                                <p class="text-[11px] text-[#80848e] mb-1">${timeString}</p>
                                <span class="bg-[#2b2d31] text-[#dbdee1] px-2 py-0.5 rounded text-[10px] uppercase font-bold">#${roomName}</span>
                            </td>
                            <td class="p-4 font-bold text-[#e4e5e7]">${m.senderName}</td>
                            <td class="p-4">${content}</td>
                            <td class="p-4 text-right">${deleteBtn}</td>
                        </tr>
                    `);
                });
            });
        }

        // ⚡ คำสั่งหลังบ้าน (Global Functions)
        window.toggleBan = async (uid, currentRole) => {
            const newRole = currentRole === 'Banned' ? 'Member' : 'Banned';
            const actionWord = newRole === 'Banned' ? 'แบน' : 'ปลดแบน';
            
            if(confirm(`⚠️ คุณแน่ใจหรือไม่ที่จะ ${actionWord} ผู้ใช้งานคนนี้?`)) {
                try {
                    await updateDoc(doc(db, "users", uid), { role: newRole });
                } catch (err) { alert("เกิดข้อผิดพลาดในการอัปเดตสถานะ!"); }
            }
        };

        window.deleteMessage = async (msgId) => {
            if(confirm('🗑️ คุณแน่ใจหรือไม่ที่จะลบข้อความนี้ทิ้งถาวร?')) {
                try {
                    await deleteDoc(doc(db, "messages", msgId));
                } catch (err) { alert("เกิดข้อผิดพลาดในการลบข้อความ!"); }
            }
        };

    </script>
</body>
</html>
