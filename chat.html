<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APOKO - Workspace & Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .channel-active { background-color: #374151; color: #e5e7eb; }
        .channel-inactive { color: #9ca3af; }
        .channel-inactive:hover { background-color: #374151; color: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden font-sans">

    <aside class="w-64 bg-gray-800 flex flex-col">
        <div class="p-4 border-b border-gray-700 flex items-center space-x-2">
            <div class="w-8 h-8 rounded-md bg-indigo-600 flex items-center justify-center font-bold text-lg">A</div>
            <div>
                <h1 class="text-xl font-bold text-indigo-400"> DOSH </h1>
                <p class="text-xs text-gray-400">เข้ามาเล่นกันเยอะๆ</p>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-6">
            <div>
                <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Channels (ห้องแชท)</h2>
                <ul class="space-y-1" id="channel-list">
                    <li><a href="#" data-channel="general" data-name="ประกาศทั่วไป" class="channel-btn block px-2 py-1.5 rounded channel-active"># ประกาศทั่วไป</a></li>
                    <li><a href="#" data-channel="project" data-name="อัปเดตงานโปรเจกต์" class="channel-btn block px-2 py-1.5 rounded channel-inactive"># อัปเดตงานโปรเจกต์</a></li>
                    <li><a href="#" data-channel="gaming" data-name="ห้องนั่งเล่นเกม" class="channel-btn block px-2 py-1.5 rounded channel-inactive"># ห้องนั่งเล่นเกม</a></li>
                </ul>
            </div>

            <div>
                <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Tools & Systems</h2>
                <ul class="space-y-1">
                    <li><a href="board.html" class="block px-2 py-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-gray-200 flex items-center"><span class="mr-2"></span> Task Board</a></li>
                    <li><a href="#" class="block px-2 py-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-gray-200 flex items-center"><span class="mr-2"></span> MMD Borrow</a></li>
                </ul>
            </div>
        </nav>

        <div class="p-4 bg-gray-800 border-t border-gray-700 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="relative flex-shrink-0">
                    <img id="current-user-avatar" src="" alt="Avatar" class="w-10 h-10 rounded-full bg-gray-700 object-cover">
                    <div id="current-user-status" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-gray-800 rounded-full"></div>
                </div>
                <div class="overflow-hidden">
                    <p id="current-user-name" class="text-sm font-medium text-gray-100 truncate w-24">กำลังโหลด...</p>
                    <p class="text-xs text-green-400">Online</p>
                </div>
            </div>
            <a href="#" id="logout-btn" class="text-gray-500 hover:text-red-400 transition" title="ออกจากระบบ">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-gray-900">
        <header class="p-4 border-b border-gray-800 flex justify-between items-center shadow-sm">
            <div>
                <h2 id="chat-header-title" class="text-lg font-bold"># ประกาศทั่วไป</h2>
                <p class="text-xs text-gray-400">กำลังเชื่อมต่อฐานข้อมูล...</p>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
            </div>

        <div class="p-4 bg-gray-900">
            <div class="flex items-center bg-gray-800 rounded-lg px-4 py-2 border border-gray-700">
                <input type="file" id="file-input" accept="image/png, image/jpeg, image/gif" class="hidden">
                <button id="attach-btn" class="text-gray-400 hover:text-indigo-400 mr-3 transition transform hover:scale-110" title="ส่งรูปภาพ หรือ GIF">📎</button>
                
                <input id="chat-input" type="text" placeholder="พิมพ์ข้อความที่นี่..." class="flex-1 bg-transparent border-none focus:outline-none text-gray-200 placeholder-gray-500">
                <button id="send-btn" class="ml-3 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1 rounded-md text-sm transition">ส่ง</button>
            </div>
        </div>
    </main>

    <aside class="w-64 bg-gray-800 border-l border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <h2 class="text-sm font-bold text-gray-300">สมาชิกทั้งหมด (<span id="member-count">0</span>)</h2>
        </div>
        <div id="members-list" class="flex-1 p-4 space-y-4 overflow-y-auto">
        </div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // คอนฟิก Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyBNsG-gdNHZzIerTyd33fIwblwccktfU9I",
            authDomain: "apoko-hq.firebaseapp.com",
            projectId: "apoko-hq",
            storageBucket: "apoko-hq.firebasestorage.app",
            messagingSenderId: "122632343459",
            appId: "1:122632343459:web:c225aaff8464f1b0c35416"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🚨🚨 API KEY ของ IMGBB ที่ใส่ไว้เรียบร้อยแล้ว 🚨🚨
        const IMGBB_API_KEY = "6b400d48dc08e690c88a8b32f3cef56a"; 

        let currentUserId = null;
        let currentUsername = "Guest";
        let activeChannel = "general"; 
        let allMessages = []; 

        const userNameElem = document.getElementById('current-user-name');
        const userAvatarElem = document.getElementById('current-user-avatar');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const chatHeaderTitle = document.getElementById('chat-header-title');
        const membersList = document.getElementById('members-list');
        const memberCount = document.getElementById('member-count');
        
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');

        // 1. ยืนยันตัวตน
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                currentUsername = user.displayName || user.email.split('@')[0];
                const avatarUrl = `https://ui-avatars.com/api/?name=${currentUsername}&background=4f46e5&color=fff&rounded=true&bold=true`;
                userNameElem.textContent = currentUsername;
                userAvatarElem.src = avatarUrl;
                await updateDoc(doc(db, "users", currentUserId), { status: 'online' }).catch(e=>console.log(e));
            } else {
                window.location.href = "register.html";
            }
        });

        window.addEventListener('beforeunload', () => {
            if (currentUserId) updateDoc(doc(db, "users", currentUserId), { status: 'offline' });
        });

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            if (currentUserId) { try { await updateDoc(doc(db, "users", currentUserId), { status: 'offline' }); } catch (error) {} }
            signOut(auth);
        });

        // 2. สลับห้องแชท
        const channelBtns = document.querySelectorAll('.channel-btn');
        channelBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                channelBtns.forEach(b => {
                    b.classList.remove('channel-active');
                    b.classList.add('channel-inactive');
                });
                btn.classList.remove('channel-inactive');
                btn.classList.add('channel-active');
                activeChannel = btn.getAttribute('data-channel');
                chatHeaderTitle.textContent = "# " + btn.getAttribute('data-name');
                renderMessages();
            });
        });

        // 3. โหลดข้อความ
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            allMessages = [];
            snapshot.forEach((docSnap) => { allMessages.push(docSnap.data()); });
            renderMessages();
        });

        function renderMessages() {
            chatContainer.innerHTML = ''; 
            const filteredMessages = allMessages.filter(msg => msg.channel === activeChannel);
            
            if(filteredMessages.length === 0) {
                chatContainer.innerHTML = `<div class="text-center text-gray-500 mt-10">ยังไม่มีข้อความในห้องนี้ เป็นคนแรกที่ทักทายสิ!</div>`;
                return;
            }

            filteredMessages.forEach((data) => {
                let timeString = "...";
                if (data.timestamp) timeString = data.timestamp.toDate().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                const msgAvatarUrl = `https://ui-avatars.com/api/?name=${data.senderName}&background=4f46e5&color=fff&rounded=true&bold=true`;
                
                let contentHTML = '';
                if (data.text) contentHTML += `<p class="text-gray-300 mt-1">${data.text}</p>`;
                if (data.imageUrl) contentHTML += `<img src="${data.imageUrl}" class="mt-2 rounded-lg max-w-sm border border-gray-700 shadow-md">`;
                
                const msgHTML = `
                <div class="flex space-x-3 hover:bg-gray-800 p-2 rounded transition">
                    <img src="${msgAvatarUrl}" class="w-10 h-10 rounded-full flex-shrink-0 object-cover">
                    <div>
                        <div class="flex items-baseline space-x-2">
                            <span class="font-bold text-sm text-indigo-300">${data.senderName}</span>
                            <span class="text-xs text-gray-500">${timeString}</span>
                        </div>
                        ${contentHTML}
                    </div>
                </div>`;
                chatContainer.insertAdjacentHTML('beforeend', msgHTML);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 4. ส่งข้อความปกติ
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = ''; 
            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    senderName: currentUsername,
                    channel: activeChannel, 
                    timestamp: serverTimestamp()
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // ==========================================
        // 🚀 เวทมนตร์: อัปโหลดรูป/GIF ผ่าน API ของ ImgBB
        // ==========================================
        attachBtn.addEventListener('click', () => { fileInput.click(); });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // ปรับ UI ให้รู้ว่ากำลังอัปโหลด
            chatInput.placeholder = "กำลังอัปโหลดรูปภาพ / GIF (รอสักครู่)...";
            chatInput.disabled = true;

            try {
                // จัดเตรียมไฟล์เพื่อส่งไป ImgBB
                const formData = new FormData();
                formData.append("image", file);

                // ยิง API ไปที่เซิร์ฟเวอร์ ImgBB
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    // อัปโหลดสำเร็จ! เอา Link รูปที่ได้ มาโยนใส่ Database ห้องแชทเรา
                    const imageUrl = result.data.url;
                    
                    await addDoc(collection(db, "messages"), {
                        text: "", // ส่งแค่รูปอย่างเดียว
                        imageUrl: imageUrl, 
                        senderName: currentUsername,
                        channel: activeChannel,
                        timestamp: serverTimestamp()
                    });
                } else {
                    alert("อัปโหลดไม่สำเร็จ: " + result.error.message);
                }
            } catch (error) {
                console.error("Error uploading image:", error);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์อัปโหลดรูป");
            } finally {
                // คืนค่า UI กลับเป็นปกติ
                chatInput.placeholder = "พิมพ์ข้อความที่นี่...";
                chatInput.disabled = false;
                fileInput.value = ""; 
                chatInput.focus();
            }
        });

        // 5. รายชื่อสมาชิก
        onSnapshot(collection(db, "users"), (snapshot) => {
            membersList.innerHTML = ''; 
            memberCount.textContent = snapshot.size; 

            snapshot.forEach((docSnap) => {
                const user = docSnap.data();
                const userName = user.username || 'Unknown';
                const userAvatar = `https://ui-avatars.com/api/?name=${userName}&background=4f46e5&color=fff&rounded=true&bold=true`;
                const isOnline = user.status === 'online';
                const statusColor = isOnline ? 'bg-green-500' : 'bg-gray-500';
                const statusText = isOnline ? 'Online' : 'Offline';

                const userHTML = `
                <div class="flex items-center space-x-3 cursor-pointer p-1.5 rounded hover:bg-gray-700 transition ${!isOnline ? 'opacity-60' : ''}">
                    <div class="relative flex-shrink-0">
                        <img src="${userAvatar}" class="w-9 h-9 rounded-full object-cover">
                        <div class="absolute bottom-0 right-0 w-3 h-3 ${statusColor} border-2 border-gray-800 rounded-full"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate ${isOnline ? 'text-gray-100' : 'text-gray-400'}">${userName}</p>
                        <p class="text-xs text-gray-500 truncate">${user.role || 'Member'} • ${statusText}</p>
                    </div>
                </div>`;
                membersList.insertAdjacentHTML('beforeend', userHTML);
            });
        });

    </script>
</body>
</html>
