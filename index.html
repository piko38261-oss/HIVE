<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HIVE Workspace - Login</title>
    
    <link rel="manifest" href="manifest.json?v=25">
    <meta name="theme-color" content="#1e1f22">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=H&background=5865F2&color=fff&size=192">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'Noto Sans Thai', 'sans-serif'], } } } }
    </script>
    <style>
        body { background-color: #1e1f22; color: #dbdee1; }
        .glass-panel { background: rgba(17, 18, 20, 0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #1e1f22; border: 1px solid #35373c; color: #dbdee1; transition: all 0.2s ease; }
        .input-field:focus { border-color: #5865F2; box-shadow: 0 0 0 1px #5865F2; outline: none; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden selection:bg-[#5865F2] selection:text-white px-4">
    
    <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-[#5865F2] rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-pulse"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-[#23a559] rounded-full mix-blend-screen filter blur-[128px] opacity-10 animate-pulse" style="animation-delay: 2s;"></div>

    <div id="toast-container" class="fixed top-5 left-1/2 z-[9999] flex flex-col items-center space-y-2 pointer-events-none transform -translate-x-1/2"></div>

    <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-2xl relative z-10 transform transition-all">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#5865F2] rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4 transform hover:scale-105 transition-transform">
                <span class="text-white text-4xl font-extrabold">H</span>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-wide">HIVE Workspace</h1>
            <p class="text-[#949ba4] text-sm mt-2 font-medium" id="header-desc">ยินดีต้อนรับกลับมา! กรุณาเข้าสู่ระบบ</p>
        </div>

        <div class="flex p-1 bg-[#111214] rounded-xl mb-6 border border-[#2b2d31]">
            <button id="tab-login" class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-[#35373c] text-white shadow transition-all">เข้าสู่ระบบ</button>
            <button id="tab-register" class="flex-1 py-2.5 text-sm font-bold rounded-lg text-[#949ba4] hover:text-white transition-all">สมัครสมาชิก</button>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-[#949ba4] uppercase mb-1.5 tracking-wider">อีเมล</label>
                <input type="email" id="login-email" required class="input-field w-full px-4 py-3 rounded-xl text-[14px]" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#949ba4] uppercase mb-1.5 tracking-wider">รหัสผ่าน</label>
                <input type="password" id="login-password" required class="input-field w-full px-4 py-3 rounded-xl text-[14px]" placeholder="••••••••">
            </div>
            <button type="submit" id="btn-login" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-3.5 rounded-xl mt-4 transition-transform transform hover:-translate-y-0.5 shadow-[0_4px_15px_rgba(88,101,242,0.4)] flex justify-center items-center">
                เข้าสู่ระบบ
            </button>
            
            <div class="flex items-center my-4 opacity-50">
                <div class="flex-grow h-px bg-[#949ba4]"></div>
                <span class="px-3 text-[#949ba4] text-[11px] font-bold uppercase tracking-wider">หรือ</span>
                <div class="flex-grow h-px bg-[#949ba4]"></div>
            </div>

            <button type="button" id="btn-google" class="w-full bg-white hover:bg-gray-200 text-gray-900 font-bold py-3.5 rounded-xl transition-transform transform hover:-translate-y-0.5 shadow-md flex justify-center items-center">
                <svg class="w-5 h-5 mr-2.5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                ดำเนินการต่อด้วย Google
            </button>
        </form>

        <form id="register-form" class="space-y-4 hidden">
            <div>
                <label class="block text-[11px] font-bold text-[#949ba4] uppercase mb-1.5 tracking-wider">ชื่อที่ใช้แสดง (Username)</label>
                <input type="text" id="reg-username" required class="input-field w-full px-4 py-3 rounded-xl text-[14px]" placeholder="เช่น: APOKO ">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#949ba4] uppercase mb-1.5 tracking-wider">อีเมล</label>
                <input type="email" id="reg-email" required class="input-field w-full px-4 py-3 rounded-xl text-[14px]" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#949ba4] uppercase mb-1.5 tracking-wider">รหัสผ่าน (ขั้นต่ำ 6 ตัว)</label>
                <input type="password" id="reg-password" required class="input-field w-full px-4 py-3 rounded-xl text-[14px]" placeholder="••••••••">
            </div>
            <button type="submit" id="btn-register" class="w-full bg-[#23a559] hover:bg-[#1e8a49] text-white font-bold py-3.5 rounded-xl mt-4 transition-transform transform hover:-translate-y-0.5 shadow-[0_4px_15px_rgba(35,165,89,0.4)] flex justify-center items-center">
                สมัครสมาชิก HIVE
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // รหัสเชื่อมต่อ Firebase ของทีมมัลติมีเดียเราครับ!
        const firebaseConfig = { 
            apiKey: "AIzaSyBNsG-gdNHZzIerTyd33fIwblwccktfU9I", 
            authDomain: "apoko-hq.firebaseapp.com", 
            projectId: "apoko-hq", 
            storageBucket: "apoko-hq.firebasestorage.app", 
            messagingSenderId: "122632343459", 
            appId: "1:122632343459:web:c225aaff8464f1b0c35416" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider(); // 🌟 ปลั๊กอิน Google

        // ระบบโชว์แจ้งเตือน
        const showToast = (msg, type = "success") => {
            const toast = document.createElement("div");
            const icon = type === "success" ? `<i class="ph-fill ph-check-circle text-[#23a559] text-[22px]"></i>` : `<i class="ph-fill ph-warning-circle text-[#da373c] text-[22px]"></i>`;
            toast.className = `flex items-center gap-3 bg-[#1e1f22] border border-[#2b2d31] text-[#dbdee1] px-5 py-3.5 rounded-xl shadow-2xl animate-[slideUpFade_0.3s_ease-out]`;
            toast.innerHTML = `${icon} <span class="text-[14px] font-bold">${msg}</span>`;
            document.getElementById("toast-container").appendChild(toast);
            setTimeout(() => { toast.classList.add("opacity-0", "transition-all", "duration-300"); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // ถ้ามีคนล็อกอินค้างไว้ ให้เด้งเข้าแอปเลยไม่ต้องล็อกอินซ้ำ
        onAuthStateChanged(auth, (user) => {
            if (user) { window.location.href = "app.html"; }
        });

        // ระบบสลับแท็บ Login / Register
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formLogin = document.getElementById('login-form');
        const formRegister = document.getElementById('register-form');
        const headerDesc = document.getElementById('header-desc');

        tabLogin.onclick = () => {
            tabLogin.className = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-[#35373c] text-white shadow transition-all";
            tabRegister.className = "flex-1 py-2.5 text-sm font-bold rounded-lg text-[#949ba4] hover:text-white transition-all";
            formLogin.classList.remove('hidden');
            formRegister.classList.add('hidden');
            headerDesc.textContent = "ยินดีต้อนรับกลับมา! กรุณาเข้าสู่ระบบ";
        };

        tabRegister.onclick = () => {
            tabRegister.className = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-[#35373c] text-white shadow transition-all";
            tabLogin.className = "flex-1 py-2.5 text-sm font-bold rounded-lg text-[#949ba4] hover:text-white transition-all";
            formRegister.classList.remove('hidden');
            formLogin.classList.add('hidden');
            headerDesc.textContent = "สร้างบัญชีใหม่เพื่อเข้าสู่ Workspace";
        };

        // กดปุ่มเข้าสู่ระบบ (Email/Pass)
        formLogin.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');
            
            btn.innerHTML = `<i class="ph-fill ph-spinner animate-spin mr-2"></i> กำลังเข้าสู่ระบบ...`;
            btn.disabled = true;
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showToast("เข้าสู่ระบบสำเร็จ!", "success");
            } catch (error) {
                showToast("อีเมลหรือรหัสผ่านไม่ถูกต้องครับ", "error");
                btn.innerHTML = "เข้าสู่ระบบ";
                btn.disabled = false;
            }
        };

        // 🌟 กดปุ่มเข้าสู่ระบบด้วย Google
        document.getElementById('btn-google').onclick = async () => {
            const btn = document.getElementById('btn-google');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="ph-fill ph-spinner animate-spin mr-2"></i> กำลังเชื่อมต่อ Google...`;
            btn.disabled = true;

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // ตรวจสอบว่าเคยสมัครหรือยัง ถ้ายังให้สร้างประวัติในฐานข้อมูล
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", user.uid), {
                        username: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        role: "Member",
                        status: "online",
                        photoURL: user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName)}&background=5865F2&color=fff&rounded=true&bold=true`,
                        createdAt: serverTimestamp()
                    });
                }
                showToast("ล็อกอินด้วย Google สำเร็จ!", "success");
            } catch (error) {
                showToast("ยกเลิกหรือเกิดข้อผิดพลาดครับ", "error");
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        };

        // กดปุ่มสมัครสมาชิก
        formRegister.onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value;
            const btn = document.getElementById('btn-register');
            
            if (pass.length < 6) { showToast("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษรครับ", "error"); return; }
            if (user === "") { showToast("กรุณากรอกชื่อด้วยครับ", "error"); return; }
            
            btn.innerHTML = `<i class="ph-fill ph-spinner animate-spin mr-2"></i> กำลังสร้างบัญชี...`;
            btn.disabled = true;
            
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCred.user, { displayName: user });
                await setDoc(doc(db, "users", userCred.user.uid), {
                    username: user,
                    email: email,
                    role: "Member",
                    status: "online",
                    photoURL: `https://ui-avatars.com/api/?name=${encodeURIComponent(user)}&background=5865F2&color=fff&rounded=true&bold=true`,
                    createdAt: serverTimestamp()
                });
                showToast("สมัครสมาชิกสำเร็จ! ยินดีต้อนรับสู่ HIVE", "success");
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showToast("อีเมลนี้ถูกใช้งานไปแล้วครับ", "error");
                } else {
                    showToast("เกิดข้อผิดพลาด: " + error.message, "error");
                }
                btn.innerHTML = "สมัครสมาชิก HIVE";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
