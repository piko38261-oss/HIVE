<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIVE Workspace - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json?v=7">
    <meta name="theme-color" content="#0e0f11">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=H&background=5865F2&color=fff&size=192">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0e0f11; 
            background-image: radial-gradient(#2b2d31 1.5px, transparent 1.5px); 
            background-size: 25px 25px; 
        }
    </style>
</head>
<body class="h-[100dvh] flex items-center justify-center text-gray-300 px-4">

    <div class="bg-[#1e1f22] p-8 rounded-2xl shadow-2xl w-full max-w-[400px] border border-[#2b2d31] relative animate-[slideUpFade_0.3s_ease-out]">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#5865F2] rounded-2xl mx-auto flex items-center justify-center text-3xl font-extrabold text-white mb-5 shadow-lg">H</div>
            <h1 class="text-2xl font-bold text-white">ยินดีต้อนรับกลับมา!</h1>
            <p class="text-[#949ba4] text-[13px] mt-1.5">เข้าสู่ระบบเพื่อทำงานกับทีมของคุณใน HIVE</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-[#80848e] uppercase tracking-wider mb-1.5">อีเมล (EMAIL)</label>
                <input type="email" id="login-email" class="w-full bg-[#111214] border border-[#2b2d31] focus:border-[#5865F2] rounded-md px-3 py-2.5 text-[14px] text-[#dbdee1] focus:outline-none transition shadow-inner">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#80848e] uppercase tracking-wider mb-1.5">รหัสผ่าน (PASSWORD)</label>
                <input type="password" id="login-password" class="w-full bg-[#111214] border border-[#2b2d31] focus:border-[#5865F2] rounded-md px-3 py-2.5 text-[14px] text-[#dbdee1] focus:outline-none transition shadow-inner">
            </div>
            
            <button id="login-btn" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-2.5 rounded-md transition shadow-md mt-4 text-[14px]">เข้าสู่ระบบ</button>
            <button id="register-btn" class="w-full bg-[#2b2d31] hover:bg-[#35373c] text-white font-bold py-2.5 rounded-md transition shadow-sm text-[14px]">สมัครสมาชิกใหม่</button>

            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-[#35373c]"></div>
                <span class="flex-shrink-0 mx-4 text-[#80848e] text-[11px] uppercase tracking-widest">หรือ</span>
                <div class="flex-grow border-t border-[#35373c]"></div>
            </div>

            <button id="google-login-btn" class="w-full bg-white hover:bg-gray-100 text-gray-800 font-bold py-2.5 rounded-md transition shadow-md flex items-center justify-center text-[14px]">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 mr-2" alt="Google"> เข้าสู่ระบบด้วย Google
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBNsG-gdNHZzIerTyd33fIwblwccktfU9I", authDomain: "apoko-hq.firebaseapp.com", projectId: "apoko-hq", storageBucket: "apoko-hq.firebasestorage.app", messagingSenderId: "122632343459", appId: "1:122632343459:web:c225aaff8464f1b0c35416" };
        
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) { window.location.replace("app.html"); }
        });

        const loginBtn = document.getElementById('login-btn');
        const googleBtn = document.getElementById('google-login-btn');
        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if(!email || !password) { alert("กรุณากรอกอีเมลและรหัสผ่านให้ครบถ้วนครับ!"); return; }
            try {
                loginBtn.innerHTML = `<span class="flex items-center justify-center"><svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังเข้าสู่ระบบ...</span>`;
                loginBtn.disabled = true;
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("เข้าสู่ระบบไม่สำเร็จ: " + error.message);
                loginBtn.innerHTML = "เข้าสู่ระบบ";
                loginBtn.disabled = false;
            }
        });

        passwordInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loginBtn.click();
        });

        googleBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", user.uid), {
                        username: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        photoURL: user.photoURL,
                        role: "Member",
                        status: "online"
                    });
                }
            } catch (error) { alert("เข้าสู่ระบบด้วย Google ไม่สำเร็จ: " + error.message); }
        });

        document.getElementById('register-btn').addEventListener('click', () => {
            alert("สามารถเชื่อมโยงปุ่มนี้ไปที่หน้า สมัครสมาชิก (register.html) ได้เลยครับ!");
        });
    </script>
</body>
</html>
