<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSH - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0e0f11">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=D&background=5865F2&color=fff&size=192">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DOSH">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0e0f11; color: #dbdee1; }
        .bg-pattern {
            background-image: radial-gradient(#2b2d31 1.5px, transparent 1.5px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-[100dvh] bg-[#0e0f11] bg-pattern relative overflow-hidden px-4">

    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-[#5865F2] rounded-full blur-[120px] opacity-10 pointer-events-none"></div>

    <div class="bg-[#1e1f22] w-full max-w-[480px] p-8 md:p-10 rounded-[20px] shadow-2xl border border-[#2b2d31] relative z-10 animate-[slideUpFade_0.4s_ease-out]">
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-[#5865F2] rounded-2xl flex items-center justify-center shadow-lg shadow-[#5865F2]/20 mb-4 transform -rotate-3 hover:rotate-0 transition">
                <span class="text-white text-3xl font-extrabold tracking-tighter">D</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white text-center tracking-tight">ยินดีต้อนรับกลับมา!</h1>
            <p class="text-[#949ba4] text-sm mt-1.5 text-center">เข้าสู่ระบบเพื่อทำงานกับทีมของคุณใน DOSH</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-[#80848e] uppercase tracking-wider mb-1.5">อีเมล (Email)</label>
                <input type="email" id="email" placeholder="you@example.com" class="w-full bg-[#111214] border border-[#2b2d31] focus:border-[#5865F2] rounded-lg px-4 py-3 text-[14px] text-[#dbdee1] focus:outline-none transition shadow-inner">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-[#80848e] uppercase tracking-wider mb-1.5">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-[#111214] border border-[#2b2d31] focus:border-[#5865F2] rounded-lg px-4 py-3 text-[14px] text-[#dbdee1] focus:outline-none transition shadow-inner">
            </div>

            <p id="error-msg" class="text-[#da373c] text-[13px] font-medium h-5 text-center transition-all"></p>

            <button id="login-btn" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-3 rounded-lg transition-all duration-200 shadow-md shadow-[#5865F2]/20 flex justify-center items-center">
                เข้าสู่ระบบ
            </button>
            <button id="register-btn" class="w-full bg-[#2b2d31] hover:bg-[#35373c] text-white font-bold py-3 rounded-lg transition-all duration-200 border border-[#1e1f22]">
                สมัครสมาชิกใหม่
            </button>
        </div>
        
        <div class="mt-6 flex items-center justify-center space-x-2">
            <div class="h-px bg-[#2b2d31] flex-1"></div>
            <span class="text-[#6d717a] text-[11px] uppercase tracking-wider font-bold">หรือ</span>
            <div class="h-px bg-[#2b2d31] flex-1"></div>
        </div>

        <button id="google-login-btn" class="w-full mt-6 bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 rounded-lg transition-all duration-200 flex justify-center items-center border border-gray-200">
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            เข้าสู่ระบบด้วย Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBNsG-gdNHZzIerTyd33fIwblwccktfU9I",
            authDomain: "apoko-hq.firebaseapp.com",
            projectId: "apoko-hq",
            storageBucket: "apoko-hq.firebasestorage.app",
            messagingSenderId: "122632343459",
            appId: "1:122632343459:web:c225aaff8464f1b0c35416"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const emailIn = document.getElementById('email'), passIn = document.getElementById('password'), errorMsg = document.getElementById('error-msg');

        async function saveUserToDB(user, isNew = false) {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists() || isNew) {
                await setDoc(userRef, {
                    username: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    photoURL: user.photoURL || "",
                    role: "Member",
                    status: "online",
                    createdAt: new Date()
                }, { merge: true });
            }
            window.location.href = "app.html";
        }

        document.getElementById('login-btn').onclick = async () => {
            try { errorMsg.textContent = "กำลังเข้าสู่ระบบ..."; const userCred = await signInWithEmailAndPassword(auth, emailIn.value, passIn.value); await saveUserToDB(userCred.user); } 
            catch (e) { errorMsg.textContent = "อีเมลหรือรหัสผ่านไม่ถูกต้อง!"; }
        };

        document.getElementById('register-btn').onclick = async () => {
            try { 
                errorMsg.textContent = "กำลังสร้างบัญชี..."; 
                const userCred = await createUserWithEmailAndPassword(auth, emailIn.value, passIn.value); 
                const defaultName = emailIn.value.split('@')[0];
                await updateProfile(userCred.user, { displayName: defaultName });
                await saveUserToDB(userCred.user, true); 
            } 
            catch (e) { errorMsg.textContent = "ไม่สามารถสมัครได้ (รหัสผ่านต้อง 6 ตัวขึ้นไป)"; }
        };

        document.getElementById('google-login-btn').onclick = async () => {
            try { errorMsg.textContent = "กำลังรอ Google..."; const result = await signInWithPopup(auth, provider); await saveUserToDB(result.user); } 
            catch (e) { errorMsg.textContent = "การล็อกอินด้วย Google ล้มเหลว!"; }
        };

        // ==========================================
        // 🚀 ลงทะเบียน PWA (ให้หน้า Login รู้จักแอป)
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('✅ DOSH ServiceWorker ทำงาน (หน้า Login)'))
                    .catch(err => console.log('❌ DOSH ServiceWorker พลาด:', err));
            });
        }
    </script>
</body>
</html>
